<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Builder - Build Your Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/builder.css">
    <script src="js/lucide.min.js"></script>
</head>
<body>
    <div class="builder-container">
        <!-- Sidebar: Activity Toolbox -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i data-lucide="wrench" style="display: inline; width: 20px; height: 20px; vertical-align: text-bottom; margin-right: 0.5rem;"></i>Activity Toolbox</h3>
                <p>Drag activities to your timeline</p>
            </div>

            <div class="phase-filter">
                <button class="filter-btn active" data-phase="all">All</button>
                <button class="filter-btn" data-phase="collect">Collect</button>
                <button class="filter-btn" data-phase="choose">Choose</button>
                <button class="filter-btn" data-phase="create">Create</button>
                <button class="filter-btn" data-phase="commit">Commit</button>
            </div>

            <div class="toolbox-activities" id="toolboxActivities">
                <!-- Activities loaded by JS -->
            </div>
        </aside>

        <!-- Main Content: Workshop Builder -->
        <main class="builder-main">
            <header class="builder-header">
                <div class="header-left">
                    <a href="index.html" class="back-link" title="Back to homepage">← Home</a>
                    <div class="header-title">
                        <h1 id="workshopTitle">Workshop Builder</h1>
                        <p class="client-info" id="clientInfo"></p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn-secondary" onclick="saveWorkshop()" title="Save (Ctrl+S)"><i data-lucide="save" style="width: 16px; height: 16px;"></i> Save</button>
                    <button class="btn-secondary" onclick="exportWorkshop()" title="Export (Ctrl+E)"><i data-lucide="download" style="width: 16px; height: 16px;"></i> Export</button>
                    <button class="btn-primary" onclick="generateReport()" title="Generate Report (Ctrl+R)"><i data-lucide="file-text" style="width: 16px; height: 16px;"></i> Generate Report</button>
                </div>
            </header>

            <div class="workshop-timeline" id="workshopTimeline">
                <!-- Days loaded by JS -->
            </div>
        </main>

        <!-- Right Sidebar: 4C's Checklist -->
        <aside class="checklist-sidebar">
            <div class="checklist-header">
                <h4>4C's Checklist</h4>
                <p>Ensure your workshop covers all phases</p>
            </div>
            <div class="checklist" id="fourCsChecklist">
                <label class="checklist-item">
                    <input type="checkbox" id="check-collect" disabled>
                    <span><i data-lucide="inbox" style="display: inline; width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 0.5rem;"></i>Collect</span>
                </label>
                <label class="checklist-item">
                    <input type="checkbox" id="check-choose" disabled>
                    <span><i data-lucide="target" style="display: inline; width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 0.5rem;"></i>Choose</span>
                </label>
                <label class="checklist-item">
                    <input type="checkbox" id="check-create" disabled>
                    <span><i data-lucide="sparkles" style="display: inline; width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 0.5rem;"></i>Create</span>
                </label>
                <label class="checklist-item">
                    <input type="checkbox" id="check-commit" disabled>
                    <span><i data-lucide="check-circle" style="display: inline; width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 0.5rem;"></i>Commit</span>
                </label>
            </div>
        </aside>
    </div>

    <!-- Activity Detail Modal -->
    <div class="modal" id="activityModal" style="display: none;" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Activity Details</h2>
                <button class="modal-close" onclick="closeModal()" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content loaded by JS -->
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/icon-map.js"></script>
    <script src="js/builder.js"></script>
    <script>
        // Initialize Lucide icons after page load
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
